# 数据库配置
db:
  host: 127.0.0.1
  port: 3306
  name: syncfile
  user: syncfile
  password: 123456

# 缓存配置
redis:
  host: 127.0.0.1
  port: 6379
  db: 0

#日志配置
log:
  path: ./log
  level: debug
  format: json
  console: true
  file: true
# 日志文件最大大小（MB）
  max_size: 100
  # 日志文件最大年龄（天）
  max_age: 7
  # 日志文件最大备份数量
  max_backup: 3

# 白名单路由配置，该路由下的请求不会进行认证
whitelist:
  - /ping
  - /register

# 认证配置
auth:
  enabled: true
#  token有效时间（天）
  token_expire: 7
#  自动刷新时间（天）
  refresh_expire: 1
#  token密钥
  secret: 123456

#  服务器配置
server:
  port: 8991

# 文件存储配置
file:
  # 允许的存储路径（Windows 盘符或 Linux 挂载点）
  allowed_paths:
    - "D:"
    - "E:"
    - "F:"
    - "G:"
  # 存储目录
  storage:
    base_path: "FileSync"
    upload_path: "uploads"
    temp_path: "temp"
    trash_path: "trash"
  # 上传配置
  upload:
    max_file_size: 10737418240     # 最大文件大小 10GB（字节）
    max_filename_length: 255       # 最大文件名长度
    allowed_extensions: []         # 允许的扩展名（空=不限制，除禁止列表外）
    forbidden_extensions:          # 禁止的扩展名
      - ".exe"

# 用户配置
user:
  avatar_path: "static/avatar"
  allowed_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
  max_size: 50485760              # 最大头像大小 50MB（字节）

# 文件同步引擎配置
sync:
  worker_concurrency: 4          # worker goroutine 数量
  max_retry: 3                   # 任务最大重试次数
  lock_ttl_seconds: 300          # 文件锁 TTL（秒）
  queue_timeout_seconds: 5       # BRPOP 阻塞超时（秒）
  task_timeout_seconds: 600      # 单任务执行超时（秒），超时后重试
  conflict_suffix: "conflict"    # 冲突文件保留后缀
  sync_catalogue: "F:/同步目录/"  # 执行实时同步的目录
